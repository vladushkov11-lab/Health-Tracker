<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Health Tracker</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=4.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💪</text></svg>">
    
    <!-- ПРИМЕНЯЕМ ТЕМУ ДО ЗАГРУЗКИ -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="nav-brand">
                <a href="/" class="nav-link">Health<span>Tracker</span></a>
            </div>
            <div class="nav-user">
                <span style="color: var(--text-secondary);">Гость</span>
                <a href="/register" class="btn-secondary">Регистрация</a>
                <button id="theme-toggle" class="theme-toggle" title="Переключить тему">🌙</button>
            </div>
        </nav>

        <div class="auth-card">
            <h1 class="logo">Health<span>Tracker</span></h1>
            <p class="tagline">Отслеживай своё здоровье</p>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <a href="/register" class="tab-btn">Регистрация</a>
            </div>

            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Войти</button>
                <p id="login-error" class="error-message"></p>
            </form>

            <div class="auth-footer">
                <p>Нет аккаунта? <a href="/register">Зарегистрируйтесь</a></p>
            </div>
        </div>
    </div>
    <script src="/static/js/common.js?v=4.0"></script>
    <script src="/static/js/auth.js?v=4.0"></script>
</body>
</html>
